name: Construir y subir imagen Spring Boot


on:
  push:
    branches:
      - main


jobs:
  docker:


    runs-on: ubuntu-latest


    steps:


      - name: Descargar código
        uses: actions/checkout@v4


      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'


      - name: Crear JAR Spring Boot
        run: mvn clean package -DskipTests


      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}


      - name: Construir imagen
        run: docker build -t mateorapt231/api-libreria:latest .


      - name: Subir imagen
        run: docker push mateorapt231/api-libreria:latest


      - name: Probar conexión EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ec2-16-59-106-156.us-east-2.compute.amazonaws.com
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull mateorapt231/api-libreria:latest
            sudo docker stop api-spring || true
            sudo docker rm api-spring || true
            sudo docker run -d \
              --name api-spring \
              --network libreria-aws \
              -p 8080:8080 \
              mateorapt231/api-libreria:latest
